<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ledger Lala - Support Center</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: #ffffff;
            width: 100%;
            max-width: 500px;
            padding: 40px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        }

        .logo {
            font-size: 60px;
            margin-bottom: 15px;
        }

        h1 {
            color: #222;
            margin-bottom: 10px;
        }

        p {
            color: #666;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            text-decoration: none;
            color: white;
            font-size: 16px;
            font-weight: bold;
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .privacy-btn {
            background-color: #2563eb;
        }

        .privacy-btn:hover {
            background-color: #1d4ed8;
        }

        .delete-btn {
            background-color: #dc2626;
        }

        .delete-btn:hover {
            background-color: #b91c1c;
        }

        .footer {
            margin-top: 20px;
            color: #888;
            font-size: 14px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px;
            }

            .logo {
                font-size: 50px;
            }

            h1 {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">📒</div>

        <h1>Ledger Lala</h1>

        <p>
            Welcome to the Ledger Lala Support Center.
            Access our Privacy Policy or request account deletion using the links below.
        </p>

        <a href="privacy-policy.html" class="btn privacy-btn">
            📜 Privacy Policy
        </a>

        <a href="account-deletion.html" class="btn delete-btn">
            🗑️ Account Deletion Request
        </a>

        <div class="footer">
            © 2026 Ledger Lala. All Rights Reserved.
        </div>
    </div>

</body>
</html>
